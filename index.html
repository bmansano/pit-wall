  function fetchTrackMap(gameKey, trackName) {
    if (!trackName || !gameKey) return;
    var key = gameKey + "||" + trackName;
    if (trackMaps[key] || trackMapLoading === key) return;
    setTrackMapLoading(key);

    var BAD = /logo|flag|emblem|badge|coat|shield|seal|icon|button|symbol|ribbon|portrait|photo|aerial/i;
    var GOOD = /circuit|track|layout|raceway|speedway|autodrome|racetrack|grand_prix/i;

    function saveMap(val) {
      setTrackMaps(function(prev) {
        var n = Object.assign({}, prev); n[key] = val;
        try { localStorage.setItem("pitwall_trackmaps", JSON.stringify(n)); } catch(e) {}
        return n;
      });
      setTrackMapLoading(null);
    }

    function fetchByFilename(filename) {
      return fetch("https://commons.wikimedia.org/w/api.php?action=query&titles=File:" + encodeURIComponent(filename) + "&prop=imageinfo&iiprop=url&iiurlwidth=1200&format=json&origin=*")
        .then(function(r) { return r.json(); })
        .then(function(info) {
          var pages = (info.query || {}).pages || {};
          var page = Object.values(pages)[0];
          if (!page || page.missing !== undefined) return null;
          var iinfo = page.imageinfo && page.imageinfo[0];
          return (iinfo && (iinfo.thumburl || iinfo.url)) || null;
        });
    }

    // 1. Try curated filename first
    var curated = TRACK_FILES[trackName];
    var p = curated
      ? fetchByFilename(curated).then(function(url) { return url || searchWikimedia(trackName); })
      : searchWikimedia(trackName);

    p.then(function(url) { saveMap(url || "NOT_FOUND"); })
     .catch(function() { saveMap("NOT_FOUND"); });

    function searchWikimedia(name) {
      // Strip parenthetical suffixes like "(NEW v1.6)" or "(Road)" for cleaner search
      var clean = name.replace(/\s*\([^)]*\)\s*/g, " ").replace(/\s+/g, " ").trim();
      var q = encodeURIComponent(clean + " circuit layout");
      return fetch("https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=" + q + "+filetype:svg&srnamespace=6&srlimit=15&format=json&origin=*")
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var hits = ((data.query || {}).search || []);
          var svgs = hits.filter(function(h) { return h.title.toLowerCase().endsWith('.svg') && !BAD.test(h.title); });
          var best = svgs.find(function(h) { return GOOD.test(h.title); }) || svgs[0];
          if (!best) return null;
          var filename = best.title.replace(/^File:/i, '');
          return fetchByFilename(filename);
        });
    }
  }

  function sendMsg(msg) {
    if (!msg.trim()) return;
    var nm = messages.concat([{ role: "user", content: msg }]);
    setMessages(nm); setInput(""); setLoading(true);
    var am = nm.map(function(m) { return { role: m.role, content: m.content }; });
    if (nm.length === 1) am[0].content = "[Driver]: " + msg;
    var payload = { model: "claude-sonnet-4-20250514", max_tokens: nm.length <= 2 ? 8000 : 3000, system: buildSystemPrompt(), messages: am };
    fetch(window.SB_URL + "/functions/v1/anthropic-proxy", {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": window.SB_KEY },
      body: JSON.stringify(payload)
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.error) throw new Error((typeof d.error === "object" ? d.error.message : d.error) || JSON.stringify(d.error));
      var txt = (d.content || []).filter(function(b) { return b.type === "text"; }).map(function(b) { return b.text; }).join("\n");
      if (!txt) throw new Error("Resposta vazia. Confirme se o secret ANTHROPIC_API_KEY está configurado em Edge Functions → Secrets no Supabase.");
      setMessages(function(p) { return p.concat([{ role: "assistant", content: txt }]); });
    }).catch(function(e) { setMessages(function(p) { return p.concat([{ role: "assistant", content: "Erro: " + e.message }]); }); })
    .finally(function() { setLoading(false); });
  }

  function startSession() {

  function getSetupTxt(msgs) { return msgs.filter(function(m) { return m.role === "assistant"; }).map(function(m) { return m.content; }).join("\n\n---\n\n"); }
  function exportTxt(s) {
    var blob = new Blob(["SETUP: " + s.game + " | " + s.track + " | " + s.condition + " | " + (s.sessionType === "qualifying" ? "QUALIFYING" : "RACE" + (s.raceLaps ? " (" + s.raceLaps + " laps)" : "")) + "\nCategory: " + s.category + "\nCars: " + s.cars.join(", ") + "\n" + "=".repeat(60) + "\n\n" + getSetupTxt(s.messages)], { type: "text/plain" });
    var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Setup_" + s.track.replace(/\W/g, "_") + ".txt"; a.click();
  }
  function exportCsv(s) {
    var csv = "Section,Parameter,Value\n"; var sec = "General";
    getSetupTxt(s.messages).split("\n").forEach(function(line) {
      var t = line.trim();
      if (t.startsWith("## ") || t.startsWith("# ")) sec = t.replace(/^#+\s*/, "");
      else if (t.startsWith("|") && !t.includes("---")) { var cols = t.split("|").filter(function(x) { return x.trim(); }).map(function(x) { return x.trim().replace(/\*\*/g, ""); }); if (cols.length >= 2) csv += '"' + sec + '","' + cols[0] + '","' + cols.slice(1).join(" | ") + '"\n'; }
      else if (t.startsWith("- ") || t.startsWith("* ")) { var parts = t.replace(/^[-*]\s*/, "").replace(/\*\*/g, "").split(":"); if (parts.length >= 2) csv += '"' + sec + '","' + parts[0].trim() + '","' + parts.slice(1).join(":").trim() + '"\n'; }
    });
    var blob = new Blob([csv], { type: "text/csv" }); var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Setup_" + s.track.replace(/\W/g, "_") + ".csv"; a.click();

          <div style={{ flex: 1, display: "flex", flexDirection: "column", borderRight: "1px solid " + C.bd, minWidth: 0, background: C.bg }}>
            <div style={{ height: 38, flexShrink: 0, padding: "0 10px 0 16px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid " + C.bd, background: C.sfc }}>
              <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, letterSpacing: 2, color: C.td, flexShrink: 0 }}>CARS</span>
              {category && <>
                <input placeholder="Search..." value={carFilter} onChange={function(e) { setCarFilter(e.target.value); }} style={{ flex: 1, maxWidth: 200, padding: "4px 10px", background: C.bg, border: "1px solid " + C.bd, borderRadius: 3, color: C.tx, fontSize: 12 }} />
                <span style={{ fontSize: 9, color: C.td, flexShrink: 0, fontFamily: "'Chakra Petch',sans-serif" }}>{selectedCars.length}/{allCars.length}</span>
                <button onClick={selAll} style={{ padding: "3px 9px", background: "transparent", border: "1px solid " + C.bd, borderRadius: 3, color: C.tm, fontSize: 8, fontFamily: "'Chakra Petch',sans-serif", letterSpacing: 0.5, flexShrink: 0 }}>{selectedCars.length === allCars.length ? "CLEAR" : "ALL"}</button>
              </>}
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "6px 4px" }}>
              {!category
                ? <div style={{ padding: "32px 16px", color: C.td, fontSize: 13, textAlign: "center" }}>Select a category</div>
                : fCars.map(function(car) {
                    var sel = selectedCars.includes(car);
                    return (
                      <button key={car} onClick={function() { toggleCar(car); }} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", textAlign: "left", padding: "8px 10px 8px 14px", marginBottom: 1, background: sel ? C.acg : "transparent", border: "none", borderLeft: "2px solid " + (sel ? C.ac : "transparent"), color: sel ? C.tx : C.ts, fontSize: 13, cursor: "pointer", borderRadius: "0 4px 4px 0" }}>
                        <span style={{ width: 14, height: 14, flexShrink: 0, border: "1px solid " + (sel ? C.ac : C.td), background: sel ? C.ac : "transparent", borderRadius: 2, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, color: "#000", fontWeight: 700 }}>{sel ? "✓" : ""}</span>
                        {car}
                      </button>
                    );
                  })
              }
            </div>
          </div>

          {/* Panel 3: Tracks */}
          <div style={{ width: 296, flexShrink: 0, display: "flex", flexDirection: "column", background: C.bg }}>
            <div style={{ height: 38, flexShrink: 0, padding: "0 10px 0 16px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid " + C.bd, background: C.sfc }}>
              <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, letterSpacing: 2, color: C.td, flexShrink: 0 }}>TRACK</span>
              {game && <input placeholder="Search..." value={trackFilter} onChange={function(e) { setTrackFilter(e.target.value); }} style={{ flex: 1, padding: "4px 10px", background: C.bg, border: "1px solid " + C.bd, borderRadius: 3, color: C.tx, fontSize: 12 }} />}
              {game && <span style={{ fontSize: 9, color: C.td, flexShrink: 0, fontFamily: "'Chakra Petch',sans-serif" }}>{fTrks.length}</span>}
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "6px 4px" }}>
              {!game
                ? <div style={{ padding: "32px 16px", color: C.td, fontSize: 13, textAlign: "center" }}>Select a simulator above</div>
                : fTrks.map(function(t) {
                    var sel = track === t;
                    return (
                      <button key={t} onClick={function() { setTrack(t); }} style={{ display: "block", width: "100%", textAlign: "left", padding: "8px 10px 8px 14px", marginBottom: 1, background: sel ? C.acg : "transparent", border: "none", borderLeft: "2px solid " + (sel ? C.ac : "transparent"), color: sel ? C.ac : C.ts, fontSize: 13, fontWeight: sel ? 500 : 400, cursor: "pointer", borderRadius: "0 4px 4px 0" }}>
                        {t}
                      </button>
                    );
                  })
              }
            </div>
          </div>
        </div>

        {/* Footer: Session type + Laps + Conditions + Generate */}
        <div style={{ height: 58, flexShrink: 0, borderTop: "1px solid " + C.bd, background: C.sf, display: "flex", alignItems: "center", padding: "0 20px", gap: 10 }}>

          <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, letterSpacing: 2, color: C.td, flexShrink: 0 }}>SESSION</span>
          {["qualifying", "race"].map(function(st) {
            var sel = sessionType === st;
            return (
              <button key={st} onClick={function() { setSessionType(st); }} style={{ padding: "5px 12px", background: sel ? C.acg : "transparent", border: "1px solid " + (sel ? C.ac : C.bd), borderRadius: 3, color: sel ? C.ac : C.ts, fontFamily: "'Chakra Petch',sans-serif", fontSize: 10, fontWeight: sel ? 600 : 400, letterSpacing: 0.5, flexShrink: 0 }}>
                {st === "qualifying" ? "QUALIFYING" : "RACE"}
              </button>
            );
          })}

          {sessionType === "race" && (
            <>
              <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, letterSpacing: 2, color: C.td, flexShrink: 0, marginLeft: 4 }}>LAPS</span>
              <input type="number" min="1" max="9999" value={raceLaps} onChange={function(e) { setRaceLaps(e.target.value); }} placeholder="0"
                style={{ width: 62, padding: "5px 8px", background: C.bg, border: "1px solid " + C.bd, borderRadius: 3, color: C.tx, fontSize: 13, textAlign: "center" }} />
            </>
          )}

          <div style={{ width: 1, height: 22, background: C.bd, flexShrink: 0, margin: "0 6px" }} />

          <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, letterSpacing: 2, color: C.td, flexShrink: 0 }}>CONDITIONS</span>
          {CONDITIONS.map(function(c) {
            var sel = condition === c;
            return (
              <button key={c} onClick={function() { setCondition(c); }} style={{ padding: "5px 12px", background: sel ? C.acg : "transparent", border: "1px solid " + (sel ? C.ac : C.bd), borderRadius: 3, color: sel ? C.ac : C.ts, fontFamily: "'Chakra Petch',sans-serif", fontSize: 10, fontWeight: sel ? 600 : 400, letterSpacing: 0.5, flexShrink: 0 }}>
                {c}
              </button>
            );
          })}

          <div style={{ flex: 1 }} />

          {canGo && (
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginRight: 14, fontSize: 12, color: C.tm, fontFamily: "'Chakra Petch',sans-serif", flexShrink: 0 }}>
              <span style={{ color: C.td }}>{selectedCars.length} car{selectedCars.length !== 1 ? "s" : ""}</span>
              <span style={{ color: C.td }}>·</span>
              <span style={{ color: C.ts }}>{track.length > 30 ? track.slice(0, 28) + "…" : track}</span>
              <span style={{ color: C.td }}>·</span>
              <span style={{ color: C.ac }}>{sessionType === "qualifying" ? "QUALI" : "RACE" + (raceLaps ? " " + raceLaps + "L" : "")}</span>
            </div>
          )}

          <button onClick={canGo ? startSession : undefined} disabled={!canGo} style={{ padding: "11px 30px", background: canGo ? C.ac : C.bd, border: "none", borderRadius: 3, color: canGo ? "#000" : C.td, fontFamily: "'Chakra Petch',sans-serif", fontWeight: 700, fontSize: 11, letterSpacing: 2, cursor: canGo ? "pointer" : "not-allowed", textTransform: "uppercase", opacity: canGo ? 1 : 0.3, flexShrink: 0 }}>
            GENERATE SETUP
          </button>
        </div>

        <Toast /><DiscardModal />
      </div>
    );
  }

  // ── SAVED SETUPS — grouped by game ─────────────────────────────────────────
  if (step === "history") {
    // Group by game name
    var gameGroups = {};
    savedSetups.forEach(function(s) { if (!gameGroups[s.game]) gameGroups[s.game] = []; gameGroups[s.game].push(s); });
    var gameNames = Object.keys(gameGroups);
    var activeGame = historyGame && gameGroups[historyGame] ? historyGame : (gameNames[0] || null);
    var groupSetups = activeGame ? gameGroups[activeGame] : [];

    if (selectedSetup) {
      // Auto-fetch map when detail opens
      var _mapKey = (selectedSetup.gameKey || "") + "||" + selectedSetup.track;
      if (!trackMaps[_mapKey] && trackMapLoading !== _mapKey) {
        setTimeout(function() { fetchTrackMap(selectedSetup.gameKey || "", selectedSetup.track); }, 0);
      }
      // Detail view
      var _mapKey2 = (selectedSetup.gameKey || "") + "||" + selectedSetup.track;
      var _mapSvg = trackMaps[_mapKey2];
      var _mapLoading2 = trackMapLoading === _mapKey2;
      return (
        <div style={{ height: "100%", background: C.bg, color: C.tx, display: "flex", flexDirection: "column" }}>
          <Header />
          <div style={{ flex: 1, overflowY: "auto", padding: "22px 28px" }}>
            <div>
              <button onClick={function() { setSelectedSetup(null); }} style={{ background: "none", border: "none", color: C.ts, fontSize: 12, cursor: "pointer", marginBottom: 20, fontFamily: "'Chakra Petch',sans-serif", letterSpacing: 1, display: "flex", alignItems: "center", gap: 6 }}>← BACK TO SAVED SETUPS</button>

              {/* Header card: info + map side by side */}
              <div style={{ background: C.sf, border: "1px solid " + C.bd, borderRadius: 6, padding: "20px 24px", marginBottom: 16, display: "flex", gap: 20, alignItems: "flex-start" }}>
                {/* Left: info */}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: "'Chakra Petch',sans-serif", fontWeight: 700, fontSize: 9, color: C.ac, letterSpacing: 1.5, marginBottom: 7 }}>{selectedSetup.game}</div>
                  <div style={{ fontSize: 20, fontWeight: 600, color: C.tx, marginBottom: 4 }}>{selectedSetup.track}</div>
                  <div style={{ fontSize: 13, color: C.ts, marginBottom: 10 }}>{selectedSetup.category}  ·  {selectedSetup.condition}  ·  <span style={{ color: C.ac }}>{selectedSetup.sessionType === "qualifying" ? "Qualifying" : "Race" + (selectedSetup.raceLaps ? " · " + selectedSetup.raceLaps + " laps" : "")}</span></div>
                  <div style={{ fontSize: 12, color: C.tm, marginBottom: 16 }}>Cars: <span style={{ color: C.ts }}>{selectedSetup.cars.join(", ")}</span></div>
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                    <button onClick={function() { continueFromSetup(selectedSetup); }} style={{ padding: "7px 16px", background: C.acg, border: "1px solid " + C.ac, borderRadius: 3, color: C.ac, fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, fontWeight: 700, letterSpacing: 1, cursor: "pointer" }}>CONTINUE IN ENGINEER</button>
                    <button onClick={function() { exportTxt(selectedSetup); }} style={{ padding: "7px 12px", background: "transparent", border: "1px solid " + C.bd, borderRadius: 3, color: C.ts, fontFamily: "'Chakra Petch',sans-serif", fontSize: 8, letterSpacing: 1 }}>EXPORT TXT</button>
                    <button onClick={function() { exportCsv(selectedSetup); }} style={{ padding: "7px 12px", background: "transparent", border: "1px solid " + C.bd, borderRadius: 3, color: C.ts, fontFamily: "'Chakra Petch',sans-serif", fontSize: 8, letterSpacing: 1 }}>EXPORT CSV</button>
                  </div>
                </div>

                {/* Right: track map thumbnail */}
                <div style={{ flexShrink: 0, width: 200 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                    <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 8, letterSpacing: 2, color: C.td }}>TRACK MAP</span>
                    {_mapSvg && _mapSvg !== "NOT_FOUND" && (
                      <button onClick={function() {
                        setTrackMaps(function(prev) { var n = Object.assign({}, prev); delete n[_mapKey2]; try { localStorage.setItem("pitwall_trackmaps", JSON.stringify(n)); } catch(e) {} return n; });
                        fetchTrackMap(selectedSetup.gameKey || "", selectedSetup.track);
                      }} style={{ background: "none", border: "none", color: C.td, fontSize: 10, cursor: "pointer", padding: 0 }}>↺</button>
                    )}
                    {!_mapSvg && !_mapLoading2 && (
                      <button onClick={function() { fetchTrackMap(selectedSetup.gameKey || "", selectedSetup.track); }} style={{ padding: "2px 8px", background: C.acg, border: "1px solid " + C.ac, borderRadius: 2, color: C.ac, fontSize: 8, fontFamily: "'Chakra Petch',sans-serif", letterSpacing: 1 }}>LOAD</button>
                    )}
                  </div>
                  <div style={{ borderRadius: 4, overflow: "hidden", border: "1px solid " + C.bd, background: "#0a0a0b", height: 140, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {_mapLoading2 && <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}><Loader /><span style={{ fontSize: 8, color: C.td, letterSpacing: 1 }}>LOADING</span></div>}
                    {_mapSvg && _mapSvg !== "NOT_FOUND" && <img src={_mapSvg} alt={selectedSetup.track} style={{ width: "100%", height: "100%", objectFit: "contain", display: "block", filter: "invert(1) sepia(1) saturate(8) hue-rotate(330deg) brightness(0.9)" }} />}
                    {_mapSvg === "NOT_FOUND" && <span style={{ fontSize: 10, color: C.td }}>Not found</span>}
                    {!_mapSvg && !_mapLoading2 && <span style={{ fontSize: 10, color: C.td }}>No map</span>}
                  </div>
                </div>
              </div>

              {/* Notes card */}
              <div style={{ background: C.sf, border: "1px solid " + C.bd, borderRadius: 6, padding: "16px 20px", marginBottom: 16 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                  <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, letterSpacing: 2, color: C.td }}>ANOTAÇÕES DE PISTA</span>
                  {editingNotesId !== selectedSetup.id
                    ? <button onClick={function() { setEditingNotesId(selectedSetup.id); setNotesText(selectedSetup.notes || ""); }} style={{ padding: "3px 10px", background: "transparent", border: "1px solid " + C.bd, borderRadius: 2, color: C.tm, fontFamily: "'Chakra Petch',sans-serif", fontSize: 8, letterSpacing: 1, cursor: "pointer" }}>EDITAR</button>
                    : <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={function() { setEditingNotesId(null); }} style={{ padding: "3px 10px", background: "transparent", border: "1px solid " + C.bd, borderRadius: 2, color: C.tm, fontFamily: "'Chakra Petch',sans-serif", fontSize: 8, letterSpacing: 1, cursor: "pointer" }}>CANCELAR</button>
                        <button onClick={function() { updateSetupNotes(selectedSetup.id, notesText); }} style={{ padding: "3px 10px", background: C.acg, border: "1px solid " + C.ac, borderRadius: 2, color: C.ac, fontFamily: "'Chakra Petch',sans-serif", fontSize: 8, fontWeight: 700, letterSpacing: 1, cursor: "pointer" }}>SALVAR</button>
                      </div>
                  }
                </div>
                {editingNotesId === selectedSetup.id
                  ? <textarea value={notesText} onChange={function(e) { setNotesText(e.target.value); }} placeholder="Anote aqui suas observações após testar na pista: comportamento do carro, ajustes necessários, comparativo de voltas..." rows={4}
                      style={{ width: "100%", padding: "10px 12px", background: C.bg, border: "1px solid " + C.ac, borderRadius: 3, color: C.tx, fontSize: 13, lineHeight: 1.6, resize: "vertical", boxSizing: "border-box" }} />
                  : <div style={{ fontSize: 13, color: selectedSetup.notes ? C.ts : C.td, lineHeight: 1.7, whiteSpace: "pre-wrap", minHeight: 28 }}>
                      {selectedSetup.notes || "Nenhuma anotação. Clique em EDITAR para adicionar observações após testar na pista."}
                    </div>
                }
              </div>

              {/* Setup messages */}
              <div style={{ background: C.sf, border: "1px solid " + C.bd, borderRadius: 6, padding: "22px 26px" }}>
                {selectedSetup.messages.map(function(m, i) {
                  var u = m.role === "user";
                  var prevAst = null;
                  if (!u) {
                    for (var pi = i - 1; pi >= 0; pi--) {
                      if (selectedSetup.messages[pi].role === "assistant") { prevAst = selectedSetup.messages[pi].content; break; }
                    }
                  }
                  return (
                    <div key={i} style={{ marginBottom: u ? 12 : 28 }}>
                      {u
                        ? <div style={{ padding: "9px 14px", background: C.acg, borderLeft: "3px solid " + C.ac, color: C.acb, fontSize: 13, lineHeight: 1.6 }}>{m.content}</div>
                        : <div style={{ lineHeight: 1.75 }}>{renderMd(m.content, prevAst)}</div>
                      }
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
          <Toast /><DiscardModal />
        </div>
      );
    }

    return (
      <div style={{ height: "100%", background: C.bg, color: C.tx, display: "flex", flexDirection: "column" }}>
        <Header />
        <div style={{ flex: 1, display: "flex", overflow: "hidden", minHeight: 0 }}>

          {/* Game sidebar */}
          <div style={{ width: 220, flexShrink: 0, background: C.sf, borderRight: "1px solid " + C.bd, display: "flex", flexDirection: "column" }}>
            <div style={{ height: 38, flexShrink: 0, padding: "0 16px", display: "flex", alignItems: "center", borderBottom: "1px solid " + C.bd, background: C.sfc }}>
              <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, letterSpacing: 2, color: C.td }}>SIMULATORS</span>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "6px 4px" }}>
              {gameNames.length === 0
                ? <div style={{ padding: "24px 14px", color: C.td, fontSize: 13, textAlign: "center" }}>No saved setups</div>
                : gameNames.map(function(gName) {
                    var sel = gName === activeGame;
                    return (
                      <button key={gName} onClick={function() { setHistoryGame(gName); }} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", padding: "10px 12px 10px 14px", marginBottom: 1, background: sel ? C.acg : "transparent", border: "none", borderLeft: "2px solid " + (sel ? C.ac : "transparent"), color: sel ? C.ac : C.ts, fontSize: 13, fontWeight: sel ? 500 : 400, cursor: "pointer", borderRadius: "0 4px 4px 0", textAlign: "left" }}>
                        <span>{gName}</span>
                        <span style={{ fontSize: 10, color: sel ? C.acb : C.td, flexShrink: 0, marginLeft: 6 }}>{gameGroups[gName].length}</span>
                      </button>
                    );
                  })
              }
            </div>
          </div>

          {/* Setups grid */}
          <div style={{ flex: 1, overflowY: "auto", padding: "20px 22px", background: C.bg }}>
            {!activeGame ? (
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%" }}>
                <div style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 28, letterSpacing: 5, opacity: 0.06, color: C.tx, marginBottom: 14 }}>[ ]</div>
                <div style={{ fontSize: 14, color: C.td }}>No saved setups yet</div>
              </div>
            ) : (
              <>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
                  <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontWeight: 700, fontSize: 13, letterSpacing: 2, color: C.tx }}>{activeGame}</span>
                  <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, color: C.td, letterSpacing: 1 }}>{groupSetups.length} SETUP{groupSetups.length !== 1 ? "S" : ""}</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(290px, 1fr))", gap: 10 }}>
                  {groupSetups.map(function(s) {
                    return (
                      <div key={s.id} onClick={function() { setSelectedSetup(s); }} style={{ background: C.sf, border: "1px solid " + C.bd, borderRadius: 5, padding: "16px 18px", cursor: "pointer", position: "relative" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                          <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontWeight: 700, fontSize: 9, letterSpacing: 1.5, color: s.sessionType === "qualifying" ? C.warn : C.ac }}>{s.sessionType === "qualifying" ? "QUALIFYING" : "RACE" + (s.raceLaps ? " · " + s.raceLaps + "L" : "")}</span>
                          <div style={{ display: "flex", gap: 2 }}>
                            <button onClick={function(e) { e.stopPropagation(); continueFromSetup(s); }} style={{ padding: "2px 7px", background: "transparent", border: "1px solid " + C.bd, borderRadius: 2, color: C.tm, fontSize: 9, fontFamily: "'Chakra Petch',sans-serif", letterSpacing: 0.5 }}>OPEN</button>
                            <button onClick={function(e) { e.stopPropagation(); deleteSetup(s.id); }} style={{ padding: "2px 7px", background: "transparent", border: "none", color: C.td, fontSize: 12 }}>✕</button>
                          </div>
                        </div>
                        <div style={{ fontSize: 16, fontWeight: 600, color: C.tx, marginBottom: 4 }}>{s.track}</div>
                        <div style={{ fontSize: 13, color: C.ts, marginBottom: 8 }}>{s.category}</div>
                        <div style={{ fontSize: 12, color: C.tm, marginBottom: 10 }}>{s.cars.slice(0, 2).join(", ")}{s.cars.length > 2 ? " +" + (s.cars.length - 2) + " more" : ""}</div>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 10, borderTop: "1px solid " + C.bd }}>
                          <span style={{ fontSize: 11, color: C.td }}>{new Date(s.ts).toLocaleDateString("pt-BR")}</span>
                          <span style={{ fontSize: 11, color: s.condition === "Wet" ? "#60a5fa" : C.tm }}>{s.condition}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </div>
        </div>
        <Toast /><DiscardModal />
      </div>
    );
  }

  // ── ENGINEER / CHAT ─────────────────────────────────────────────────────────
  return (
    <div style={{ height: "100%", background: C.bg, color: C.tx, display: "flex", flexDirection: "column" }}>
      <Header />
      <div style={{ flex: 1, display: "flex", overflow: "hidden", minHeight: 0 }}>

        {/* Sidebar */}
        {sidebarOpen && (
          <div style={{ width: 262, flexShrink: 0, background: C.sf, borderRight: "1px solid " + C.bd, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {/* Session info */}
            <div style={{ padding: "14px 16px", borderBottom: "1px solid " + C.bd }}>
              <div style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 8, letterSpacing: 2, color: C.td, marginBottom: 10 }}>SESSION</div>
              {[["Simulator", cg ? cg.name : "—"], ["Category", cc ? cc.name : "—"], ["Track", track || "—"], ["Conditions", condition], ["Session Type", sessionType === "qualifying" ? "Qualifying" : "Race" + (raceLaps ? " · " + raceLaps + " laps" : "")]].map(function(r) {
                return (
                  <div key={r[0]} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", fontSize: 12, marginBottom: 6 }}>
                    <span style={{ color: C.td, flexShrink: 0 }}>{r[0]}</span>
                    <span style={{ color: C.ts, fontWeight: 500, maxWidth: 148, textAlign: "right", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r[1]}</span>
                  </div>
                );
              })}
              {selectedCars.length > 0 && (
                <div style={{ marginTop: 8, padding: "8px 10px", background: C.bg, borderRadius: 3, maxHeight: 90, overflowY: "auto" }}>
                  {selectedCars.map(function(c, i) { return <div key={i} style={{ fontSize: 12, color: C.ts, lineHeight: 2 }}><span style={{ color: C.ac, marginRight: 6 }}>›</span>{c}</div>; })}
                </div>
              )}
            </div>

            {/* Track Map */}
            {(game && track) && (function() {
              var key = game + "||" + track;
              var svg = trackMaps[key];
              var loading2 = trackMapLoading === key;
              return (
                <div style={{ borderBottom: "1px solid " + C.bd }}>
                  <div style={{ padding: "8px 16px 6px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 8, letterSpacing: 2, color: C.td }}>TRACK MAP</span>
                    {!svg && !loading2 && (
                      <button onClick={function() { fetchTrackMap(game, track); }} style={{ padding: "2px 8px", background: "transparent", border: "1px solid " + C.bd, borderRadius: 2, color: C.tm, fontSize: 8, letterSpacing: 0.5 }}>GENERATE</button>
                    )}
                    {svg && (
                      <button onClick={function() {
                        setTrackMaps(function(prev) { var n = Object.assign({}, prev); delete n[key]; try { localStorage.setItem("pitwall_trackmaps", JSON.stringify(n)); } catch(e) {} return n; });
                      }} style={{ padding: "2px 8px", background: "transparent", border: "none", borderRadius: 2, color: C.td, fontSize: 8 }}>↺</button>
                    )}
                  </div>
                  <div style={{ padding: "0 10px 10px" }}>
                    {loading2 && <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "14px 6px", color: C.td, fontSize: 9, letterSpacing: 1 }}><Loader /><span>SEARCHING CIRCUIT</span></div>}
                    {svg && svg !== "NOT_FOUND" && <div style={{ borderRadius: 3, overflow: "hidden", border: "1px solid " + C.bd, lineHeight: 0, background: "#0a0a0b" }}><img src={svg} alt={track} style={{ width: "100%", height: "auto", display: "block", filter: "invert(1) sepia(1) saturate(8) hue-rotate(330deg) brightness(0.9)" }} /></div>}
                    {svg === "NOT_FOUND" && <div style={{ padding: "10px 6px", color: C.td, fontSize: 11, textAlign: "center" }}>Map not found on Wikimedia</div>}
                    {!svg && !loading2 && <div style={{ padding: "10px 6px", color: C.td, fontSize: 11, textAlign: "center" }}>No map loaded yet</div>}
                  </div>
                </div>
              );
            })()}

            {/* Actions */}
            <div style={{ padding: "10px 12px", borderBottom: "1px solid " + C.bd, display: "flex", flexDirection: "column", gap: 8 }}>
              <button onClick={saveSetup} disabled={messages.length < 2} style={{ width: "100%", padding: "8px", background: messages.length >= 2 ? C.acg : "transparent", border: "1px solid " + (messages.length >= 2 ? C.ac : C.bd), borderRadius: 3, color: messages.length >= 2 ? C.ac : C.td, fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, fontWeight: 700, letterSpacing: 1.5, cursor: messages.length >= 2 ? "pointer" : "not-allowed", textTransform: "uppercase" }}>
                SAVE A COPY
              </button>
              <button onClick={function() { setStep("config"); }} style={{ width: "100%", padding: "7px", background: "transparent", border: "1px solid " + C.bd, borderRadius: 3, color: C.ts, fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, letterSpacing: 1.5, textTransform: "uppercase" }}>
                BACK TO CONFIGURE
              </button>
            </div>

            {/* Quick feedback */}
            <div style={{ padding: "10px 14px 4px", fontFamily: "'Chakra Petch',sans-serif", fontSize: 8, letterSpacing: 2, color: C.td }}>DRIVER FEEDBACK</div>
            <div style={{ flex: 1, overflowY: "auto", padding: "0 8px 8px" }}>
              {qf.map(function(f, i) {
                return (
                  <button key={i} onClick={function() { if (!loading) sendMsg(f); }} style={{ display: "block", width: "100%", textAlign: "left", padding: "8px 10px", marginBottom: 2, background: "transparent", border: "1px solid transparent", borderRadius: 3, color: C.ts, fontSize: 13, cursor: loading ? "not-allowed" : "pointer", opacity: loading ? 0.3 : 1, lineHeight: 1.4 }}>
                    {f}
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Main chat */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
          {/* Chat topbar */}
          <div style={{ height: 40, flexShrink: 0, padding: "0 16px", borderBottom: "1px solid " + C.bd, background: C.sf, display: "flex", alignItems: "center", gap: 10 }}>
            <button onClick={function() { setSidebarOpen(!sidebarOpen); }} style={{ background: "none", border: "none", color: C.td, fontSize: 12, cursor: "pointer", padding: "4px 6px" }}>{sidebarOpen ? "◁" : "▷"}</button>
            <div style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 10, color: C.tm, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", letterSpacing: 0.5, flex: 1, minWidth: 0 }}>
              {cg ? <span style={{ color: C.ts }}>{cg.name}</span> : ""}
              {cc ? <span style={{ color: C.td }}> › {cc.name}</span> : ""}
              {track ? <span style={{ color: C.td }}> › {track}</span> : ""}
              {condition && track ? <span style={{ color: condition === "Wet" ? "#60a5fa" : C.warn }}> › {condition}</span> : ""}
              {sessionType && track ? <span style={{ color: C.td }}> › {sessionType === "qualifying" ? "QUALI" : "RACE" + (raceLaps ? " " + raceLaps + "L" : "")}</span> : ""}
            </div>
          </div>

          {/* Messages */}
          <div style={{ flex: 1, overflowY: "auto", padding: "22px 28px" }}>
            {messages.length === 0 && !loading && (
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", textAlign: "center" }}>
                <div style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 36, letterSpacing: 7, opacity: 0.05, color: C.tx, marginBottom: 16 }}>ENGINEER</div>
                <div style={{ fontSize: 14, color: C.td, marginBottom: 10 }}>No active engineer session</div>
                <div style={{ fontSize: 13, color: C.td, marginBottom: 24 }}>Configure your car, track, and session type, then generate a setup</div>
                <button onClick={function() { setStep("config"); }} style={{ padding: "9px 22px", background: "transparent", border: "1px solid " + C.bd, borderRadius: 3, color: C.ts, fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, letterSpacing: 1.5, cursor: "pointer" }}>GO TO CONFIGURE</button>
              </div>
            )}
            {messages.map(function(m, i) {
              var u = m.role === "user";
              // Find previous assistant message for diff (only for follow-up responses, not first setup)
              var prevAssistant = null;
              if (!u && i > 0) {
                for (var pi = i - 1; pi >= 0; pi--) {
                  if (messages[pi].role === "assistant") { prevAssistant = messages[pi].content; break; }
                }
              }
              return (
                <div key={i} style={{ marginBottom: u ? 12 : 28 }}>
                  {u
                    ? <div style={{ padding: "9px 14px", background: C.acg, borderLeft: "3px solid " + C.ac, color: C.acb, fontSize: 13, lineHeight: 1.6 }}>{m.content}</div>
                    : <div style={{ lineHeight: 1.75 }}>{renderMd(m.content, prevAssistant)}</div>
                  }
                </div>
              );
            })}
            {loading && (
              <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 0", color: C.td }}>
                <Loader />
                <span style={{ fontFamily: "'Chakra Petch',sans-serif", fontSize: 9, letterSpacing: 2 }}>ANALYZING TELEMETRY</span>
              </div>
            )}
            <div ref={chatEndRef} />
          </div>

          {/* Input */}
          <div style={{ padding: "14px 22px", borderTop: "1px solid " + C.bd, background: C.sf, flexShrink: 0 }}>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-end" }}>
              <textarea value={input} onChange={function(e) { setInput(e.target.value); }} onKeyDown={function(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!loading) sendMsg(input); } }} placeholder="Describe car behavior, request adjustments, or ask about strategy..." rows={2}
                style={{ flex: 1, resize: "none", padding: "11px 14px", background: C.bg, border: "1px solid " + C.bd, borderRadius: 4, color: C.tx, fontSize: 14, lineHeight: 1.6 }} />
              <button onClick={function() { if (!loading) sendMsg(input); }} disabled={loading || !input.trim()} style={{ padding: "11px 26px", background: (loading || !input.trim()) ? C.bd : C.ac, border: "none", borderRadius: 4, color: (loading || !input.trim()) ? C.td : "#000", fontFamily: "'Chakra Petch',sans-serif", fontWeight: 700, fontSize: 10, letterSpacing: 1.5, cursor: (loading || !input.trim()) ? "not-allowed" : "pointer", textTransform: "uppercase", height: 50, flexShrink: 0 }}>
                SEND
              </button>
            </div>
          </div>
        </div>
      </div>
      <Toast /><DiscardModal />
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
